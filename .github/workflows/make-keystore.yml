name: Make Keystore (run once)
on: workflow_dispatch
jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore with random password
        run: |
          PASS=$(openssl rand -hex 20)
          keytool -genkeypair -v -keystore reelfit.keystore -alias reelfit \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=PursTech, OU=Reelfit, O=PursTech, L=Karachi, C=PK"
          base64 -w0 reelfit.keystore > KEYSTORE_B64.txt
          echo "$PASS" > KEYSTORE_PASS.txt
          echo "Keystore generated. Download the artifact, save both values as repo secrets, then DELETE the artifact."
      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-SAVE-TO-SECRETS-THEN-DELETE
          path: |
            KEYSTORE_B64.txt
            KEYSTORE_PASS.txt
          retention-days: 1
