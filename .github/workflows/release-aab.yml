name: Release AAB (Play Store)
on: workflow_dispatch
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund
      - name: Generate Android project
        run: npx cap add android
      - name: Generate icons and splash screens
        run: npx capacitor-assets generate --android
      - name: Sync web app into Android
        run: npx cap sync android
      - name: Set version from package.json + run number
        run: |
          V=$(node -p "require('./package.json').version")
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$V\"/" android/app/build.gradle
      - name: Build release AAB
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon
      - name: Sign AAB
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > reelfit.keystore
          jarsigner -keystore reelfit.keystore -storepass "${{ secrets.KEYSTORE_PASS }}" \
            android/app/build/outputs/bundle/release/app-release.aab reelfit
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Reelfit-release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
